services:
  account-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: account_service
      POSTGRES_PASSWORD: account_service_pass
      POSTGRES_DB: account_db
    ports:
      - "5434:5432"
    volumes:
      - account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_service -d account_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  # psql -U account_service -h localhost account_db -p 5434

  account-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://account_service:account_service_pass@account-db:5432/account_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/account/migrations:/migrations:ro
    depends_on:
      account-db:
        condition: service_healthy
    restart: on-failure

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  account:
    build:
      context: ../../
      dockerfile: services/account/Dockerfile
    ports:
      - "50052:50052"
      - "8081:8081"
    environment:
      GRPC_PORT: "50052"
      HTTP_PORT: "8081"
      DB_HOST: account-db
      DB_PORT: "5432"
      DB_USER: account_service
      DB_PASSWORD: account_service_pass
      DB_NAME: account_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_ACCOUNT_EVENTS_TOPIC: account-events
      KAFKA_TRANSACTION_COMMANDS_TOPIC: transaction-commands
      KAFKA_GROUP_ID: account-service
      PUBLIC_KEY_PATH: /keys/public-key.pem
      DEV_MODE: "true"
    volumes:
      - ../../keys:/keys:ro
    restart: on-failure
    depends_on:
      account-db:
        condition: service_healthy
      account-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

volumes:
  account-db-data:
  kafka-data:
