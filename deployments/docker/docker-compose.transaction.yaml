services:
  transaction-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: transaction_service
      POSTGRES_PASSWORD: transaction_service_pass
      POSTGRES_DB: transaction_db
    ports:
      - "5435:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_service -d transaction_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  # psql -U transaction_service -h localhost transaction_db -p 5435

  transaction-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://transaction_service:transaction_service_pass@transaction-db:5432/transaction_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/transaction/migrations:/migrations:ro
    depends_on:
      transaction-db:
        condition: service_healthy
    restart: on-failure

  kafka:
    image: bitnami/kafka:3.9
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  transaction:
    build:
      context: ../../
      dockerfile: services/transaction/Dockerfile
    ports:
      - "50053:50053"
    environment:
      GRPC_PORT: "50053"
      DB_HOST: transaction-db
      DB_PORT: "5432"
      DB_USER: transaction_service
      DB_PASSWORD: transaction_service_pass
      DB_NAME: transaction_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_ACCOUNT_EVENTS_TOPIC: account-events
      KAFKA_TRANSACTION_COMMANDS_TOPIC: transaction-commands
      KAFKA_GROUP_ID: transaction-service
      # In isolated mode, account/user services are external — set these to point to them
      ACCOUNT_SERVICE_ADDR: "localhost:50052"
      USER_SERVICE_ADDR: "localhost:50051"
      DEV_MODE: "true"
    restart: on-failure
    depends_on:
      transaction-db:
        condition: service_healthy
      transaction-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

volumes:
  transaction-db-data:
  kafka-data:
