services:
  user-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  # psql -U user_service -h localhost user_db -p 5433
  
  user-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://user_service:user_service_pass@user-db:5432/user_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/user/migrations:/migrations:ro
    depends_on:
      user-db:
        condition: service_healthy
    restart: on-failure

  user:
    build:
      context: ../../
      dockerfile: services/user/Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
      DB_HOST: user-db
      DB_PORT: "5432"
      DB_USER: user_service
      DB_PASSWORD: user_service_pass
      DB_NAME: user_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: ""
      REDIS_HOST: user-redis
      REDIS_PORT: "6379"
      PRIVATE_KEY_PATH: /keys/private-key.pem
    volumes:
      - ../../keys:/keys:ro
    depends_on:
      user-db:
        condition: service_healthy
      user-redis:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully

volumes:
  user-db-data:
