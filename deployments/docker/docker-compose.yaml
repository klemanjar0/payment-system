services:
  # --- Infrastructure ---
  postgres-user:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_service -d user_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-account:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: account_service
      POSTGRES_PASSWORD: account_service_pass
      POSTGRES_DB: account_db
    ports:
      - "5434:5432"
    volumes:
      - account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U account_service -d account_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-transaction:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: transaction_service
      POSTGRES_PASSWORD: transaction_service_pass
      POSTGRES_DB: transaction_db
    ports:
      - "5435:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U transaction_service -d transaction_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Migrations ---
  user-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://user_service:user_service_pass@postgres-user:5432/user_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/user/migrations:/migrations:ro
    depends_on:
      postgres-user:
        condition: service_healthy
    restart: on-failure

  account-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://account_service:account_service_pass@postgres-account:5432/account_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/account/migrations:/migrations:ro
    depends_on:
      postgres-account:
        condition: service_healthy
    restart: on-failure

  transaction-migrate:
    image: migrate/migrate
    command:
      - "-path=/migrations"
      - "-database=postgres://transaction_service:transaction_service_pass@postgres-transaction:5432/transaction_db?sslmode=disable"
      - "up"
    volumes:
      - ../../services/transaction/migrations:/migrations:ro
    depends_on:
      postgres-transaction:
        condition: service_healthy
    restart: on-failure

  # --- Services ---
  user:
    build:
      context: ../../
      dockerfile: services/user/Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      GRPC_PORT: "50051"
      DB_HOST: postgres-user
      DB_PORT: "5432"
      DB_USER: user_service
      DB_PASSWORD: user_service_pass
      DB_NAME: user_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DEV_MODE: "false"
      PRIVATE_KEY_PATH: /keys/private-key.pem
    volumes:
      - ../../keys:/keys:ro
    depends_on:
      postgres-user:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  account:
    build:
      context: ../../
      dockerfile: services/account/Dockerfile
    ports:
      - "50052:50052"
      - "8081:8081"
    environment:
      GRPC_PORT: "50052"
      HTTP_PORT: "8081"
      DB_HOST: postgres-account
      DB_PORT: "5432"
      DB_USER: account_service
      DB_PASSWORD: account_service_pass
      DB_NAME: account_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_ACCOUNT_EVENTS_TOPIC: account-events
      KAFKA_TRANSACTION_COMMANDS_TOPIC: transaction-commands
      KAFKA_GROUP_ID: account-service
      PUBLIC_KEY_PATH: /keys/public-key.pem
      DEV_MODE: "false"
    volumes:
      - ../../keys:/keys:ro
    depends_on:
      postgres-account:
        condition: service_healthy
      account-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: on-failure

  transaction:
    build:
      context: ../../
      dockerfile: services/transaction/Dockerfile
    ports:
      - "50053:50053"
      - "8082:8082"
    environment:
      GRPC_PORT: "50053"
      HTTP_PORT: "8082"
      DB_HOST: postgres-transaction
      DB_PORT: "5432"
      DB_USER: transaction_service
      DB_PASSWORD: transaction_service_pass
      DB_NAME: transaction_db
      DB_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_ACCOUNT_EVENTS_TOPIC: account-events
      KAFKA_TRANSACTION_COMMANDS_TOPIC: transaction-commands
      KAFKA_GROUP_ID: transaction-service
      ACCOUNT_SERVICE_ADDR: account:50052
      USER_SERVICE_ADDR: user:50051
      PUBLIC_KEY_PATH: /keys/public-key.pem
      DEV_MODE: "false"
    volumes:
      - ../../keys:/keys:ro
    depends_on:
      postgres-transaction:
        condition: service_healthy
      transaction-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      account:
        condition: service_started
      user:
        condition: service_started
    restart: on-failure

volumes:
  user-db-data:
  account-db-data:
  transaction-db-data:
  kafka-data:
